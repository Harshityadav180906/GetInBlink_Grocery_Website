<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Fruits Store</title>
<link rel="stylesheet" href="./style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">GetIn<span>Blink</span></div>
    <input type="text" placeholder="Search fruits..." class="search">
    <a href="../Cart/Index.html"><button class="cart">Cart 🛒</button></a>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Fresh Fruits Delivered Fast 🍓</h1>
    <p>Healthy, Organic & Affordable</p>
</section>

<!-- PRODUCTS -->
<section class="products">

    <h2>Popular Fruits</h2>

    <div class="grid">

        <div class="card">
            <img src="./image/apple.jpeg">
            <h3>Apple</h3>
            <p>₹120/kg</p>
            <button id="add_cart" onclick="addToCart('Apple', 120)">Add To Cart</button>
        </div>

        <div class="card">
            <img src="./image/banana.webp">
            <h3>Banana</h3>
            <p>₹40/dozen</p>
            <button id="add_cart" onclick="addToCart('Banana', 40)">Add To Cart</button>
        </div>

        <div class="card">
            <img src="./image/mango.webp">
            <h3>Mango</h3>
            <p>₹150/kg</p>
            <button id="add_cart" onclick="addToCart('Mango', 150)">Add To Cart</button>
        </div>

        <div class="card">
            <img src="./image/orange.webp">
            <h3>Orange</h3>
            <p>₹80/kg</p>
            <button id="add_cart" onclick="addToCart('Orange', 80)">Add To Cart</button>
        </div>

        <div class="card">
            <img src="./image/strawberry.webp">
            <h3>Strawberry</h3>
            <p>₹200/kg</p>
            <button id="add_cart" onclick="addToCart('Strawberry', 200)">Add To Cart</button>
        </div>

        <div class="card">
            <img src="./image/pinapple.webp">
            <h3>Pineapple</h3>
            <p>₹90</p>
            <button id="add_cart" onclick="addToCart('Pineapple', 90)">Add To Cart</button>
        </div>

    </div>

</section>
<script>
    // Load cart from localStorage or create empty cart
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(productName, price) {
    // Check if product already exists
    let existingProduct = cart.find(item => item.name === productName);

    if (existingProduct) {
        existingProduct.quantity += 1;
    } else {
        cart.push({
            name: productName,
            price: price,
            quantity: 1
        });
    }

    // Save to localStorage
    localStorage.setItem("cart", JSON.stringify(cart));

    alert(productName + " added to cart!");
    console.log(cart);
}

</script>
</body>
</html>
