<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<h2>My Cart</h2>
<table>
    <thead>
        <tr>
            <th>Product</th>
            <th>Price (₹)</th>
            <th>Quantity</th>
            <th>Total (₹)</th>
        </tr>
    </thead>
    <tbody id="cart-items"></tbody>
    <tfoot>
        <tr>
            <td colspan="3" class="total">Grand Total</td>
            <td class="total" id="grand-total">₹0</td>
        </tr>
    </tfoot>
</table>
<button onclick="clearCart()">PLACE ORDER</button>


<script src="./script.js"></script>
</body>
</html>
