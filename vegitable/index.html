<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Vegetables</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">Fresh<span>Veggies</span></div>
    <input type="text" placeholder="Search vegetables..." class="search">
    <div class="header-btns">
        <button class="login">Login</button>
        <a href="../Cart/Index.html"><button class="cart">🛒 Cart</button></a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Farm Fresh Vegetables 🥕</h1>
    <p>Delivered in minutes | 100% Organic</p>
</section>

<!-- CATEGORY -->
<section class="categories">
    <div class="cat">Leafy</div>
    <div class="cat">Roots</div>
    <div class="cat">Exotic</div>
    <div class="cat">Seasonal</div>
</section>

<!-- PRODUCTS -->
<section class="products">
    <h2>Popular Vegetables</h2>

    <div class="grid">

        <div class="card">
            <img src="./image/potato.webp">
            <p class="weight">1kg</p>
            <h3>Potato</h3>
            <div class="price-row">
                <span>₹30</span>
                <button>Add</button>
            </div>
        </div>

        <div class="card">
            <img src="./image/tomato.webp">
            <p class="weight">500g</p>
            <h3>Tomato</h3>
            <div class="price-row">
                <span>₹25</span>
                <button>Add</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <p class="weight">1kg</p>
            <h3>Onion</h3>
            <div class="price-row">
                <span>₹40</span>
                <button>Add</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <p class="weight">250g</p>
            <h3>Spinach</h3>
            <div class="price-row">
                <span>₹20</span>
                <button>Add</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <p class="weight">500g</p>
            <h3>Carrot</h3>
            <div class="price-row">
                <span>₹35</span>
                <button>Add</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150">
            <p class="weight">250g</p>
            <h3>Broccoli</h3>
            <div class="price-row">
                <span>₹60</span>
                <button>Add</button>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 FreshVeggies | All Rights Reserved</p>
</footer>

</body>
</html>
